server:
  port: ${PORT:8080}
  address: 0.0.0.0  # ← ADD THIS LINE
  servlet:
    context-path: /api/v1

spring:
  application:
    name: InnerCityBackend

  datasource:  # Fixed: removed duplicate "spring:" key
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method


google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY}

logging:
  level:
    com.example.InnerCityBackend: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG