
server:
  port: ${PORT:8080}
  address: 0.0.0.0
  servlet:
    context-path: /api/v1

spring:
  application:
    name: InnerCityBackend
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  mail:
    host: smtp-relay.brevo.com
    port: 2525 # Changed from 587 to 2525
    username: a8d647001@smtp-brevo.com
    password: xsmtpsib-8f0f8938953cc32cac739300bbc0c0a59cdb0fd4db4378af448fda304cdf2a6d-mzjFayohj8UFFRHw
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
      # MOVE THIS LINE HERE (Out of the 'mail' nesting)
      from: osunyingboadedeji1@gmail.com

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true
      file-size-threshold: 2KB

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: ${JWT_EXPIRATION:86400000}

# Add this section for image uploads
app:
  upload:
    dir: ${UPLOAD_DIR:/tmp/uploads}
  frontend-url: https://icm-web-beta.vercel.app

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY}

logging:
  level:
    com.example.InnerCityBackend: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.springframework.boot: DEBUG